name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-secret-key-for-learning-platform-production-checks-2026
      DEBUG: "False"
      DATABASE_URL: sqlite:///db.sqlite3
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost:8000
      CORS_ALLOWED_ORIGINS: http://localhost:8081
      AI_DATA_PIPELINE_PROVIDER: rules
      ENVIRONMENT: ci
      LOG_FORMAT: json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python manage.py check
      - run: python manage.py check --deploy --settings=config.settings.production
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py backup_database --dry-run
      - run: python manage.py test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:web
