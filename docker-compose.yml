services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: k_game
      POSTGRES_USER: k_game
      POSTGRES_PASSWORD: k_game_local_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U k_game -d k_game"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      ENVIRONMENT: docker
      SECRET_KEY: docker-local-secret-change-before-production
      DEBUG: "False"
      DATABASE_URL: postgresql://k_game:k_game_local_password@db:5432/k_game
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      CORS_ALLOWED_ORIGINS: http://localhost:8081,http://127.0.0.1:8081
      SECURE_SSL_REDIRECT: "False"
      SECURE_HSTS_SECONDS: "0"
      AI_DATA_PIPELINE_PROVIDER: rules
      LOG_FORMAT: json
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --no-input &&
             gunicorn config.wsgi:application --config gunicorn.conf.py"

  frontend:
    build:
      context: ./frontend
      args:
        EXPO_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api/v1
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  postgres_data:
