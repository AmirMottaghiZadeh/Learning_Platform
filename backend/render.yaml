services:
  - type: web
    name: pharmexa-backend
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --config gunicorn.conf.py
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: LOG_FORMAT
        value: json
      - key: AI_DATA_PIPELINE_PROVIDER
        value: rules
      - key: DATABASE_URL
        fromDatabase:
          name: pharmexa-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PASSWORD_RESET_FRONTEND_URL
        value: https://AmirMottaghiZadeh.github.io/Learning_Platform/
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: True
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: CACHE_BACKEND
        sync: false
      - key: CACHE_LOCATION
        sync: false

databases:
  - name: pharmexa-db
    databaseName: pharmexa
    user: pharmexa
